version: 0.2

env:
  variables:
    TF_VERSION: "1.9.8"
  exported-variables:
    - STAGE

phases:
  install:
    runtime-versions:
      python: "3.12"
    commands:
      - pip install --upgrade pip
      - pip install pytest pytest-cov boto3 xgboost scikit-learn pandas numpy
      - wget -q https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -q terraform_${TF_VERSION}_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - python -m pytest tests/unit/ -v --tb=short --junitxml=reports/unit-tests.xml

  build:
    commands:
      - bash scripts/ci_build.sh

  post_build:
    commands:
      - echo "Build completed at $(date)"

reports:
  UnitTestReports:
    files:
      - "reports/unit-tests.xml"
    file-format: JUNITXML

artifacts:
  files:
    - "terraform/environments/dev/tfplan.binary"
    - "terraform/environments/dev/tfplan.json"
    - "reports/**/*"
  discard-paths: no
  secondary-artifacts:
    source:
      files:
        - "**/*"
      discard-paths: no

cache:
  paths:
    - "/root/.cache/pip/**/*"
