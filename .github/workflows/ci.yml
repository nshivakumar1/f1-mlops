name: F1 MLOps CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write  # OIDC auth to AWS
  contents: read

# Prevent concurrent Terraform applies on main — queue them, don't cancel
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TF_VERSION: "1.9.8"
  TF_WORKING_DIR: terraform/environments/dev
  S3_ARTIFACTS_BUCKET: f1-mlops-artifacts-297997106614
  LAMBDA_FUNCTIONS: "enrichment rest_handler prewarm slack_notifier prerace_check"

jobs:
  # ── 1. Tests + static checks (every push/PR) ────────────────────────────────
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate
        run: |
          cd ${{ env.TF_WORKING_DIR }}
          terraform init -backend=false -no-color
          terraform validate -no-color

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend build check
        run: npm run build
        working-directory: frontend

  # ── 2. Terraform plan (main branch only) ────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build Lambda ZIPs (manylinux) and upload to S3
        run: |
          set -euo pipefail
          for func in ${{ env.LAMBDA_FUNCTIONS }}; do
            src="lambda/${func}"
            out="terraform/modules/lambda/${func}.zip"
            if [ ! -d "$src" ]; then
              echo "::warning::lambda/${func} directory not found, skipping"
              continue
            fi
            mkdir -p "build/${func}"
            if [ -f "${src}/requirements.txt" ] && grep -qvE '^\s*#|^\s*$' "${src}/requirements.txt"; then
              echo "Installing ${func} deps..."
              # Pass 1: manylinux binary wheels (native extensions, e.g., groq/grpcio)
              # Silently ignore packages that have no manylinux wheel (e.g., pure-Python)
              pip install --quiet \
                --platform manylinux2014_x86_64 \
                --implementation cp \
                --python-version 3.12 \
                --only-binary=:all: \
                -r "${src}/requirements.txt" \
                -t "build/${func}/" 2>/dev/null || true
              # Pass 2: pure-Python wheels (none-any, e.g., sentry-sdk) skipped by pass 1
              # Runner is x86_64 Linux so native installs are Lambda-compatible
              pip install --quiet \
                --only-binary=:all: \
                -r "${src}/requirements.txt" \
                -t "build/${func}/"
              if [ -z "$(ls -A build/${func}/)" ]; then
                echo "::error::pip install for ${func} produced empty build dir"
                exit 1
              fi
            fi
            cp "${src}"/*.py "build/${func}/"
            (cd "build/${func}" && zip -qr "../../${out}" .)
            ZIP_SIZE_BYTES=$(stat -c%s "${out}" 2>/dev/null || stat -f%z "${out}")
            ZIP_SIZE_MB=$((ZIP_SIZE_BYTES / 1024 / 1024))
            echo "Built ${out} (${ZIP_SIZE_MB}MB)"
            # Guard: enrichment without groq deps should be ~80MB; <1MB means no deps
            if [ "${func}" = "enrichment" ] && [ "${ZIP_SIZE_MB}" -lt 1 ]; then
              echo "::error::enrichment ZIP is ${ZIP_SIZE_MB}MB — expected ~80MB (groq deps missing)"
              exit 1
            fi
            aws s3 cp "${out}" "s3://${{ env.S3_ARTIFACTS_BUCKET }}/lambda-deployments/${func}.zip" \
              --region us-east-1
            echo "Uploaded s3://${{ env.S3_ARTIFACTS_BUCKET }}/lambda-deployments/${func}.zip"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan
        env:
          TF_VAR_sentry_dsn: ${{ secrets.TF_VAR_SENTRY_DSN }}
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -out=tfplan.binary 2>&1 | tee plan_output.txt
          terraform show -json tfplan.binary > tfplan.json
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Plan summary
        run: |
          echo "### Terraform Plan — \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^Plan:|will be created|will be destroyed|will be updated|No changes" \
            ${{ env.TF_WORKING_DIR }}/plan_output.txt >> $GITHUB_STEP_SUMMARY || \
            tail -5 ${{ env.TF_WORKING_DIR }}/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan.binary
            ${{ env.TF_WORKING_DIR }}/tfplan.json
            terraform/modules/lambda/enrichment.zip
            terraform/modules/lambda/rest_handler.zip
            terraform/modules/lambda/prewarm.zip
            terraform/modules/lambda/slack_notifier.zip
            terraform/modules/lambda/prerace_check.zip
          retention-days: 7

  # ── 3. Terraform apply (requires manual approval via GitHub environment) ─────
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # GitHub environment — add yourself as required reviewer
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: terraform  # artifact root is terraform/ (LCA of all uploaded paths)

      - name: Terraform init
        run: terraform init -input=false -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        run: terraform apply -input=false -no-color -auto-approve tfplan.binary
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Redeploy Lambda functions from S3 manylinux ZIPs
        # Terraform's archive_file re-zips source-only in deploy context (no pip deps).
        # Pull the manylinux ZIPs from S3 (uploaded during plan) to override.
        run: |
          set -euo pipefail
          for func in ${{ env.LAMBDA_FUNCTIONS }}; do
            FN="f1-mlops-${func//_/-}"
            S3_KEY="lambda-deployments/${func}.zip"
            if ! aws lambda get-function --function-name "$FN" --region us-east-1 &>/dev/null; then
              echo "  ${FN}: not found, skipping"
              continue
            fi
            if ! aws s3 ls "s3://${{ env.S3_ARTIFACTS_BUCKET }}/${S3_KEY}" --region us-east-1 &>/dev/null; then
              echo "::warning::${func}: no S3 ZIP found, skipping redeploy"
              continue
            fi
            CODE_SIZE=$(aws lambda update-function-code \
              --function-name "$FN" \
              --s3-bucket "${{ env.S3_ARTIFACTS_BUCKET }}" \
              --s3-key "$S3_KEY" \
              --region us-east-1 \
              --output json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['CodeSize'])")
            echo "  ${FN}: updated (${CODE_SIZE} bytes) — waiting for active state..."
            aws lambda wait function-updated \
              --function-name "$FN" \
              --region us-east-1
            echo "  ${FN}: active"
          done

      - name: Print Terraform outputs
        run: terraform output -no-color -json
        working-directory: ${{ env.TF_WORKING_DIR }}
